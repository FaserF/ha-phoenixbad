name: Bug Report
description: Report a bug with the PhoenixBad integration
title: '[Bug]: '
labels: ['bug', 'triage']
assignees:
  - FaserF
body:
  - type: markdown
    attributes:
      value: |
        ## Before You Submit
        - Search [existing issues](https://github.com/FaserF/ha-phoenixbad/issues) to avoid duplicates
        - Read the [documentation](https://github.com/FaserF/ha-phoenixbad/blob/master/README.md)
        - Check the integration on your HA instance: [![Open Integration](https://my.home-assistant.io/badges/integration.svg)](https://my.home-assistant.io/redirect/integration/?domain=phoenixbad)

  - type: input
    id: integration_version
    attributes:
      label: Integration Version
      description: Which version of the PhoenixBad integration are you using?
      placeholder: e.g. v1.3.2-dev0
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      description: Which version of Home Assistant are you running? [![Open HA Info](https://my.home-assistant.io/badges/info.svg)](https://my.home-assistant.io/redirect/info/)
      placeholder: 2026.6.4
    validations:
      required: true

  - type: dropdown
    id: ha_install_type
    attributes:
      label: Home Assistant Installation Type
      description: How is Home Assistant installed?
      options:
        - Home Assistant OS
        - Home Assistant Container
        - Home Assistant Supervised
        - Home Assistant Core
    validations:
      required: true

  - type: dropdown
    id: facility_area
    attributes:
      label: Facility Area
      description: Which area of the PhoenixBad facility is affected?
      options:
        - Main pool
        - Training pool
        - Sauna
        - Overall occupancy
    validations:
      required: false

  - type: textarea
    id: bug_description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: false

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: false

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostic Information
      description: |
        Paste diagnostic data here (optional). [![Open Diagnostics](https://my.home-assistant.io/badges/diagnostics.svg)](https://my.home-assistant.io/redirect/diagnostics/)
      render: yaml
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste any relevant log output here. Enable debug logging for `custom_components.phoenixbad` if possible.
      render: shell
    validations:
      required: false
